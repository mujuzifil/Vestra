server {
    listen 8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 20M;

    # Security headers for responses nginx serves ITSELF (static files, errors).
    #
    # Deliberately not set for PHP responses: the SecurityHeaders middleware
    # already emits them, and nginx add_header does not replace an upstream
    # header — it appends, producing duplicates like
    # "X-Frame-Options: DENY, DENY". The middleware is the single source of
    # truth for application responses and is covered by SecurityHeadersTest.

    # Static asset caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Laravel storage (symlinked from public/storage)
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Nginx liveness only — deliberately NOT named /health.
    #
    # This returns 200 without touching PHP-FPM, so it says nothing about
    # whether the application works. The container HEALTHCHECK targets
    # /api/v1/health instead, which exercises DB, cache and storage. Renaming
    # this endpoint keeps it from shadowing that route.
    location = /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # PHP-FPM
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
