# ==============================================================================
# VESTRA — Nginx reverse proxy (main configuration)
# ==============================================================================
# Site configuration lives in /etc/nginx/templates/*.conf.template and is
# rendered into /etc/nginx/conf.d at container start by the official image's
# envsubst entrypoint (APP_DOMAIN / API_DOMAIN).
# ==============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;

    keepalive_timeout  65;
    client_max_body_size 20M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/vnd.api+json
        font/ttf
        font/otf
        image/svg+xml;

    # --- Rate limiting ---
    # Defence in depth. Laravel's RateLimitServiceProvider remains the
    # authoritative per-route limiter; these zones absorb volumetric abuse
    # before it reaches PHP-FPM.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # --- TLS ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Explicit include, not a glob: the base image ships its own
    # conf.d/default.conf and a glob would load that stray vhost alongside ours.
    include /etc/nginx/conf.d/vestra.conf;
}
