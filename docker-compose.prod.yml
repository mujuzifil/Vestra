services:
  # --- Frontend (Next.js standalone) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vestra-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    networks:
      - vestra-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- Backend (PHP-FPM + Nginx) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: vestra-backend
    restart: unless-stopped
    ports:
      - "8000:8080"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DEBUGBAR_ENABLED=false
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-vestra}
      - DB_USERNAME=${DB_USERNAME:-vestra}
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
      - LOG_CHANNEL=stderr
      - LOG_LEVEL=warning
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - vestra-network
    volumes:
      - backend-storage:/var/www/html/storage
      - backend-logs:/var/www/html/storage/logs

  # --- MySQL Database ---
  db:
    image: mysql:8.0
    container_name: vestra-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE:-vestra}
      - MYSQL_USER=${DB_USERNAME:-vestra}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - vestra-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Redis Cache / Queue / Session ---
  redis:
    image: redis:7-alpine
    container_name: vestra-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - vestra-network

  # --- Nginx Reverse Proxy (optional, for SSL termination) ---
  # nginx:
  #   image: nginx:alpine
  #   container_name: vestra-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/conf.d:/etc/nginx/conf.d:ro
  #     - ./certbot/conf:/etc/letsencrypt:ro
  #     - ./certbot/www:/var/www/certbot:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - vestra-network

networks:
  vestra-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
  backend-storage:
  backend-logs:
