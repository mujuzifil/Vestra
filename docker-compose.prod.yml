# ==============================================================================
# VESTRA — Production Stack
# ==============================================================================
#
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Ingress is nginx only. The frontend and backend ports are deliberately NOT
# published to the host — they are reachable solely on the internal network.
# ==============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Backend, queue worker and scheduler run the same image with the same
# environment. Only the command and the RUN_MIGRATIONS guard differ.
x-backend-env: &backend-env
  APP_NAME: ${APP_NAME:-VESTRA}
  APP_ENV: production
  APP_DEBUG: "false"
  DEBUGBAR_ENABLED: "false"
  APP_KEY: ${APP_KEY:?APP_KEY is required — generate with php artisan key:generate --show}
  APP_URL: ${APP_URL:?APP_URL is required}
  FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
  TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}

  # Without this, CORS falls back to APP_URL and blocks the storefront.
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}

  DB_CONNECTION: mysql
  DB_HOST: db
  DB_PORT: "3306"
  DB_DATABASE: ${DB_DATABASE:-vestra}
  DB_USERNAME: ${DB_USERNAME:-vestra}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

  CACHE_STORE: redis
  CACHE_PREFIX: vestra_cache
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

  SESSION_DOMAIN: ${SESSION_DOMAIN}
  SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
  SESSION_SAME_SITE: ${SESSION_SAME_SITE:-strict}
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  SESSION_ENCRYPT: "true"
  SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
  SANCTUM_TOKEN_EXPIRATION: ${SANCTUM_TOKEN_EXPIRATION:-10080}

  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME}
  MAIL_PASSWORD: ${MAIL_PASSWORD}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-VESTRA}

  FLUTTERWAVE_PUBLIC_KEY: ${FLUTTERWAVE_PUBLIC_KEY}
  FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY}
  FLUTTERWAVE_ENCRYPTION_KEY: ${FLUTTERWAVE_ENCRYPTION_KEY}
  FLUTTERWAVE_WEBHOOK_SECRET: ${FLUTTERWAVE_WEBHOOK_SECRET}

  BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}

  LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
  LOG_LEVEL: ${LOG_LEVEL:-warning}

services:
  # ---------------------------------------------------------------------------
  # Nginx reverse proxy — sole ingress, TLS termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: vestra-nginx
    restart: unless-stopped
    # The main config sets worker_connections 2048; the default container nofile
    # (1024) makes nginx warn at startup and caps real concurrency below that.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-vestra.com}
      - API_DOMAIN=${API_DOMAIN:-api.vestra.com}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/templates:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - vestra-network
    logging: *default-logging
    # 127.0.0.1, not localhost: inside the container `localhost` resolves to ::1
    # first, and these servers bind IPv4 only — the probe would fail against a
    # perfectly healthy service.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Certbot — Let's Encrypt certificate renewal
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: vestra-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Attempt renewal twice daily, as Let's Encrypt recommends.
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done"
    networks:
      - vestra-network
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Frontend — Next.js standalone
  # ---------------------------------------------------------------------------
  # NEXT_PUBLIC_* are inlined into the client bundle AT BUILD TIME and must be
  # passed as build args. Setting them only as runtime environment has no effect
  # on the shipped JavaScript.
  frontend:
    image: ${DOCKER_REGISTRY:-vestra}/vestra-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required at build time}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?NEXT_PUBLIC_SITE_URL is required at build time}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:?NEXT_PUBLIC_BACKEND_URL is required at build time}
        NEXT_PUBLIC_CDN_HOST: ${NEXT_PUBLIC_CDN_HOST:-}
    container_name: vestra-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      # Server-side rendering calls the backend over the internal network,
      # bypassing the public hostname and TLS. See frontend/lib/api/client.ts.
      - API_BASE_URL=http://backend:8080/api/v1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vestra-network
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # Backend — PHP-FPM + Nginx. Owns migrations.
  # ---------------------------------------------------------------------------
  backend:
    image: ${DOCKER_REGISTRY:-vestra}/vestra-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: vestra-backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      <<: *backend-env
      # Only this service migrates. The queue and scheduler replicas must not
      # race it.
      RUN_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vestra-network
    volumes:
      - backend-storage:/var/www/html/storage/app
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # Queue worker — processes the redis queue
  # ---------------------------------------------------------------------------
  queue:
    image: ${DOCKER_REGISTRY:-vestra}/vestra-backend:${IMAGE_TAG:-latest}
    container_name: vestra-queue
    restart: unless-stopped
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "false"
      CONTAINER_ROLE: queue
    command:
      - php
      - artisan
      - queue:work
      - --tries=3
      - --backoff=10
      - --max-time=3600
      - --max-jobs=1000
      - --sleep=3
      - --timeout=120
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vestra-network
    volumes:
      - backend-storage:/var/www/html/storage/app
    logging: *default-logging
    healthcheck:
      test: ["CMD", "php", "artisan", "queue:monitor", "default"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Scheduler — runs routes/console.php schedule
  # ---------------------------------------------------------------------------
  # Without this, auth:cleanup-exchange-tokens and sanctum:cleanup-expired never
  # run and expired tokens accumulate indefinitely.
  scheduler:
    image: ${DOCKER_REGISTRY:-vestra}/vestra-backend:${IMAGE_TAG:-latest}
    container_name: vestra-scheduler
    restart: unless-stopped
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "false"
      CONTAINER_ROLE: scheduler
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vestra-network
    volumes:
      - backend-storage:/var/www/html/storage/app
    logging: *default-logging
    # Override the image's HEALTHCHECK, which curls the web endpoint. This
    # container runs schedule:work, not nginx, so the inherited probe could
    # never pass and the service would sit permanently "unhealthy".
    # Verify the schedule is registered instead.
    healthcheck:
      test: ["CMD-SHELL", "php artisan schedule:list > /dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # MySQL
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: vestra-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      - MYSQL_DATABASE=${DB_DATABASE:-vestra}
      - MYSQL_USER=${DB_USERNAME:-vestra}
      - MYSQL_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=512M
      - --max-connections=150
      - --slow-query-log=1
      - --slow-query-log-file=/var/lib/mysql/slow.log
      - --long-query-time=1
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - vestra-network
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1500M

  # ---------------------------------------------------------------------------
  # Redis — cache + queue + sessions
  # ---------------------------------------------------------------------------
  # noeviction is deliberate: this instance backs the queue and sessions, not
  # just the cache. An LRU policy would silently discard queued jobs and log
  # users out under memory pressure. AOF persists the queue across restarts.
  redis:
    image: redis:7-alpine
    container_name: vestra-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - noeviction
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - redis-data:/data
    networks:
      - vestra-network
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 640M

networks:
  vestra-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
  backend-storage:
