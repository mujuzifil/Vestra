name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  backend:
    name: Backend Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: pdo_mysql, gd, zip, bcmath, opcache, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run Pint (code style)
        run: vendor/bin/pint --test
        continue-on-error: true

      - name: Run static analysis
        run: vendor/bin/phpstan analyse --memory-limit=512M
        continue-on-error: true

      - name: Prepare product images for validation
        run: |
          mkdir -p storage/app/public/products
          cp ../frontend/public/assets/images/products/*.png storage/app/public/products/

      - name: Set up SQLite database and seed products
        run: |
          touch database/database.sqlite
          php artisan migrate --force
          php artisan db:seed --class=DatabaseSeeder --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Link storage
        run: php artisan storage:link
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Validate product media
        run: php artisan media:validate
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        run: docker build -t vestra-frontend:latest ./frontend

      - name: Build backend image
        run: docker build -t vestra-backend:latest -f ./backend/Dockerfile.prod ./backend

      - name: Validate docker-compose
        run: docker compose -f docker-compose.prod.yml config
