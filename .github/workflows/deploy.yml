name: Deploy to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing image tag to deploy (leave blank to build from this commit)"
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # ---------------------------------------------------------------------------
  # Build and publish immutable, commit-tagged images.
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY_NAMESPACE }}/vestra-backend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY_NAMESPACE }}/vestra-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NEXT_PUBLIC_* must be baked in here — they cannot be supplied at run
      # time. A change to the API domain therefore requires a rebuild, not just
      # a restart.
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_NAMESPACE }}/vestra-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY_NAMESPACE }}/vestra-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

  # ---------------------------------------------------------------------------
  # Deploy the published tag to the VPS.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/vestra

            # Back up before touching anything. A deploy that cannot be undone
            # is not a deploy.
            ./scripts/backup.sh /opt/vestra/backups

            # Record the currently deployed tag so rollback.sh has a target,
            # then point the stack at the new one.
            CURRENT_TAG="$(grep '^IMAGE_TAG=' .env.production | cut -d= -f2- || echo '')"
            sed -i "s|^PREVIOUS_TAG=.*|PREVIOUS_TAG=${CURRENT_TAG}|" .env.production
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env.production

            git fetch --all
            git checkout "${GITHUB_SHA:-HEAD}" -- docker-compose.prod.yml nginx scripts || true

            docker compose -f docker-compose.prod.yml --env-file .env.production pull

            # Migrate before the cutover, using the new image, so a failing
            # migration aborts the deploy while the old containers still serve.
            docker compose -f docker-compose.prod.yml --env-file .env.production \
              run --rm --entrypoint php backend artisan migrate --force

            docker compose -f docker-compose.prod.yml --env-file .env.production up -d

      - name: Health gate
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/vestra
            echo "Waiting for backend to report healthy..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml --env-file .env.production \
                   exec -T backend curl -fsS http://localhost:8080/api/v1/health >/dev/null 2>&1; then
                echo "Backend healthy after ${i} attempt(s)."
                exit 0
              fi
              sleep 10
            done
            echo "::error::Backend did not become healthy. Run ./scripts/rollback.sh"
            docker compose -f docker-compose.prod.yml --env-file .env.production logs --tail=100 backend
            exit 1

      - name: Prune unused images
        if: success()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # Keep 72h of images so rollback still has something to roll back to.
          script: docker image prune -af --filter "until=72h"
